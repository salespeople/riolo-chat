# apphosting.yaml
runConfig:
  region: us-central1
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  - variable: SENDPULSE_CLIENT_ID
    secret: SENDPULSE_CLIENT_ID
  - variable: SENDPULSE_CLIENT_SECRET
    secret: SENDPULSE_CLIENT_SECRET
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    